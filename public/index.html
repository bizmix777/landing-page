<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- <link rel="stylesheet" href="../style.css"> -->
    <link rel="stylesheet" href="style.css">
    <!-- INJEÇÃO DAS VARIÁVEIS DA VERCEL -->
    <script>
        window.env = {
            SUPABASE_URL: "${SUPABASE_URL}",
            SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
            TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}",
            TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}",
            WHATSAPP_NUMBER: "${WHATSAPP_NUMBER}"
        };
    </script>

    <title>Landing Page</title>
</head>

<body>

    <!-- CONTEÚDO DA LANDING PAGE -->
    <div id="conteudo-principal">
        <h1>Sua Landing Page</h1>
        <p>Coloque aqui todo o conteúdo atual da sua landing page, sem perder nada.</p>
    </div>

    <!-- FORMULÁRIO -->
    <form id="leadForm">
        <h2>Entre em Contato</h2>

        <label>Nome:</label>
        <input type="text" id="name" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Telefone:</label>
        <input type="text" id="phone">

        <label>Mensagem:</label>
        <textarea id="message"></textarea>

        <button type="submit">Enviar</button>
    </form>

    <p id="status"></p>

    <!-- SCRIPT: SUPABASE + TELEGRAM + WHATSAPP -->
    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabaseUrl = window.env.SUPABASE_URL;
        const supabaseKey = window.env.SUPABASE_ANON_KEY;

        const supabase = createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById("leadForm");
        const status = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const message = document.getElementById("message").value;

            status.textContent = "Enviando...";

            // Salvar no Supabase
            const { error } = await supabase
                .from("leads")
                .insert([{ name, email, phone, message }]);

            if (error) {
                status.textContent = "Erro ao salvar no Supabase.";
                console.error(error);
                return;
            }

            // Enviar mensagem para Telegram
            const telegramMessage =
                `Novo Lead:%0A%0A` +
                `Nome: ${name}%0A` +
                `Email: ${email}%0A` +
                `Telefone: ${phone}%0A` +
                `Mensagem: ${message}`;

            fetch(
                `https://api.telegram.org/bot${window.env.TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${window.env.TELEGRAM_CHAT_ID}&text=${telegramMessage}`
            );

            // Enviar WhatsApp
            const whatsappNumber = window.env.WHATSAPP_NUMBER;
            const whatsappText =
                `Novo Lead:%0A%0A` +
                `Nome: ${name}%0A` +
                `Email: ${email}%0A` +
                `Telefone: ${phone}%0A` +
                `Mensagem: ${message}`;

            window.open(`https://wa.me/${whatsappNumber}?text=${whatsappText}`, "_blank");

            status.textContent = "Enviado com sucesso!";
            form.reset();
        });
    </script>

</body>
</html>
