<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <script>
    window.env = {
        SUPABASE_URL: "${SUPABASE_URL}",
        SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
        TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}",
        TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}",
        WHATSAPP_NUMBER: "${WHATSAPP_NUMBER}"
    };
</script>
    <title>Landing Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: #f5f5f5;
        }

        h1, h2 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            box-shadow: 0 0 10px #ccc;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0 16px 0;
            border: 1px solid #aaa;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            background: #0070f3;
            color: white;
            padding: 12px 20px;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0059c9;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- CONTEÚDO ORIGINAL DA SUA LANDING PAGE -->
    <div id="conteudo-principal">
        <h1>Sua Landing Page</h1>
        <p>Coloque aqui todo o conteúdo atual da sua landing page, sem perder nada.</p>
    </div>

    <!-- FORMULÁRIO -->
    <form id="leadForm">
        <h2>Entre em Contato</h2>

        <label>Nome:</label>
        <input type="text" id="name" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Telefone:</label>
        <input type="text" id="phone">

        <label>Mensagem:</label>
        <textarea id="message"></textarea>

        <button type="submit">Enviar</button>
    </form>

    <p id="status"></p>

    <!-- SCRIPT: SUPABASE + TELEGRAM + WHATSAPP -->
    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabaseUrl = window.env.SUPABASE_URL;
        const supabaseKey = window.env.SUPABASE_ANON_KEY;

        const supabase = createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById("leadForm");
        const status = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const message = document.getElementById("message").value;

            status.textContent = "Enviando...";

            // Salvar no Supabase
            const { error } = await supabase
                .from("leads")
                .insert([{ name, email, phone, message }]);

            if (error) {
                status.textContent = "Erro ao salvar no Supabase.";
                return;
            }

            // Enviar mensagem para Telegram
            const telegramMessage = `Novo Lead:%0A%0A`
                + `Nome: ${name}%0A`
                + `Email: ${email}%0A`
                + `Telefone: ${phone}%0A`
                + `Mensagem: ${message}`;

            fetch(
                `https://api.telegram.org/bot${window.env.TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${window.env.TELEGRAM_CHAT_ID}&text=${telegramMessage}`
            );

            // Enviar WhatsApp para você
            const whatsappNumber = window.env.WHATSAPP_NUMBER; // formato: 5511999999999
            const whatsappText = `Novo Lead:%0A%0A`
                + `Nome: ${name}%0A`
                + `Email: ${email}%0A`
                + `Telefone: ${phone}%0A`
                + `Mensagem: ${message}`;

            window.open(`https://wa.me/${whatsappNumber}?text=${whatsappText}`, "_blank");

            status.textContent = "Enviado com sucesso!";
            form.reset();
        });
    </script>

</body>
</html>
