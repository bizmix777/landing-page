# Alias curto específico: Glister
# ============================================
[[redirects]]
  from = "/cuidados_pessoais/glister"
  to = "/lp/cuidados_pessoais/glister?utm_source=alias-cuidados_pessoais&utm_medium=redirect&utm_campaign=topo_funil&utm_content=glister"
