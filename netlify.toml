[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Canonical: APEX → WWW (apenas esta direção)
[[redirects]]
  from = "https://bizmix.com.br/*"
  to = "https://www.bizmix.com.br/:splat"
  status = 301
  force = true

# Aliases curtos → LPs (com UTMs)
[[redirects]]
  from = "/nutricao"
  to = "/lp/nutricao?utm_source=alias-nutricao&utm_medium=redirect&utm_campaign=topo_funil&utm_content=entry"
  status = 301
  force = true

