# =========================
# Build & Publish (Astro)
# =========================
[build]
  command = "npm run build"
  publish = "dist"

# Opcional: Node no build (ou defina em Site settings → Environment)
[build.environment]
  NODE_VERSION = "20"

# ===========================================
# Canonical: forçar www no domínio principal
# ===========================================
[[redirects]]
  from = "https://bizmix.com.br/*"
  to = "https://www.bizmix.com.br/:splat"
  status = 301
  force = true

# ============================================
# Aliases curtos → LPs (com UTMs padronizadas)
# ============================================

[[redirects]]
  from = "/nutricao"
  to = "/lp/nutricao?utm_source=alias-nutricao&utm_medium=redirect&utm_campaign=topo_funil&utm_content=entry"
  status = 301
  force = true

[[redirects]]
  from = "/beleza"
  to = "/lp/beleza?utm_source=alias-beleza&utm_medium=redirect&utm_campaign=topo_funil&utm_content=entry"
  status = 301
  force = true

[[redirects]]
  from = "/cuidados_pessoais"
  to = "/lp/cuidados_pessoais?utm_source=alias-cuidados_pessoais&utm_medium=redirect&utm_campaign=topo_funil&utm_content=entry"
  status = 301
  force = true

[[redirects]]
  from = "/cuidados-pessoais"
  to = "/lp/cuidados_pessoais?utm_source=alias-cuidados-pessoais&utm_medium=redirect&utm_campaign=topo_funil&utm_content=entry"
