cat > wrangler.toml << 'EOF'
name = "inicio-lp"
type = "javascript"
account_id = "YOUR_ACCOUNT_ID"
workers_dev = true
routes = []

[build]
command = "npm run build"
cwd = "."

[env.production]
routes = [
  { pattern = "inicio-lp.account-bizmix777.workers.dev", zone_name = "account-bizmix777.workers.dev" }
]
EOF
